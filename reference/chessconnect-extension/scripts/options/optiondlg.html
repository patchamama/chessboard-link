<!doctype html>
<html lang="en" style="min-width: 800px; min-height: 500px">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chessconnect Options</title>
    <style>
      body {
        font-family: 'Arial', sans-serif;
        line-height: 1.6;
        margin: 20px;
        background-color: #f0edea;
      }

      h1,
      h2 {
        font-size: 18px;
      }

      ul {
        list-style-type: circle;
        padding-left: 20px;
      }

      .version {
        margin-bottom: 10px;
      }

      .date {
        font-style: italic;
      }

      .tab-container {
        width: 100%;
        height: 100%;
        margin: 0px auto;
        border: 1px solid #ddd;
        border-radius: 5px;
        overflow: hidden;
        background-color: #f0edea;
      }

      .tab-header {
        display: flex;
        background-color: #f0edea;
      }

      .tab-btn {
        border: none;
        outline: none;
        cursor: pointer;
        padding: 10px 10px;
        flex: 1;
        text-align: center;
        transition: background-color 0.3s;
        background-color: #eee4dd;
      }

      .tab-btn.active {
        background-color: #d7c0b0;
      }

      .flex-container {
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
      }

      .flex-container > div {
        margin: 10px;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
        background-color: #f0edea;
      }

      .flex-container label {
        margin-bottom: 5px;
        padding: 5px;
      }

      .flex-container select,
      .flex-container input {
        width: calc(100% - 10px);
        /* Adjusted width */
        padding: 4px;
        box-sizing: border-box;
        margin-bottom: 5px;
        /* Adjusted margin */
      }

      #status {
        margin-top: 10px;
        border-radius: 5px;
        background-color: #f0edea;
      }

      .optionButton {
        padding: 8px 16px;
        background-color: #d7c0b0;
        color: black;
        border: none;
        cursor: pointer;
        border-radius: 5px;
        display: block;
        margin: 20px auto;
        width: 80%;
      }

      .optionButton:disabled {
        background-color: #ddd;
      }

      p {
        margin-bottom: 10px;
      }

      a {
        color: black;
      }

      a:hover {
        text-decoration: underline;
      }

      .align-vertical {
        display: flex;
        align-items: center;
      }

      .checkbox-label {
        display: flex;
        align-items: center;
      }

      .checkbox-label input[type='checkbox'] {
        margin-right: 5px;
        max-width: max-content;
      }

      .button-container {
        display: flex;
        justify-content: space-between;
        width: 100%;
        gap: 20px;
      }

      input[type='color'] {
        border: none;
        padding: 0;
        background: none;
      }
    </style>
  </head>

  <body>
    <div class="tab-content" id="tabOptions" style="display: block">
      <div class="flex-container">
        <div>
          <label for="boardType" i18ntag="Chessboard"></label>
          <select id="boardType">
            <option value="3">Certabo, TabuTronic</option>
            <option value="11">TabuTronic Spectrum</option>
            <option value="1">Chessnut</option>
            <option value="9">ChessUp</option>
            <option value="5">DGT eBoard</option>
            <option value="6">DGT Pegasus</option>
            <option value="10">DGT Revelation II</option>
            <option value="14">GoChess</option>
            <option value="4">House of Staunton</option>
            <option value="7">iChessOne</option>
            <option value="15">Manya Cynus</option>
            <option value="2">Millennium</option>
            <option value="13">Phantom Chessboard</option>
            <option value="12">SenseRobot</option>
            <option value="8">Yizhi, 逸智</option>
          </select>

          <label for="connectionType" i18ntag="ConnectionMethod"></label>
          <select id="connectionType">
            <option value="5">Bluetooth</option>
            <option value="6">USB</option>
          </select>

          <label for="onOpponentMove" i18ntag="OnOpponentMove"></label>
          <select id="onOpponentMove">
            <option value="1" i18ntag="Beep"></option>
            <option value="2" i18ntag="KnockWood"></option>
            <option value="3" i18ntag="AnnounceMove"></option>
            <option value="0" i18ntag="StayQuiet"></option>
          </select>

          <label for="voice" i18ntag="Voice"></label>
          <select id="voice"></select>

          <label class="checkbox-label" for="confirmBoardOk">
            <input type="checkbox" id="confirmBoardOk" name="confirmBoardOk" />
            <span i18ntag="confirmBoardOk"></span>
          </label>

          <label for="latency" i18ntag="MoveLatencyInMs"></label>
          <input type="number" id="latency" />
        </div>
      </div>
    </div>

    <div class="button-container">
      <button class="optionButton" id="moreOptions" i18ntag="moreOptions"></button>
    </div>

    <div class="align-vertical" style="flex-direction: row; gap: 10px; justify-content: space-between">
      <a href="https://play.google.com/store/apps/details?id=de.chessconnect" target="_blank" id="googlePlayLink">
        <img src="../../res/GetItOnGooglePlay.png" alt="Get it on Google Play" style="height: 25px; cursor: pointer" />
      </a>
      <a href="https://apps.apple.com/de/app/chessconnect/id6747821027" target="_blank" id="appStoreLink">
        <img src="../../res/GetItOnAppStore.svg" alt="Get it on App Store" style="height: 25px; cursor: pointer" />
      </a>
      <div style="display: flex; flex-direction: row; align-items: center">
        <span i18ntag="SupportMe"></span>
        <a href="https://www.buymeacoffee.com/chessconnect" target="_blank"
          ><img
            width="150px"
            src="https://img.buymeacoffee.com/button-api/?text=Buy me a tea&emoji=☕&slug=chessconnect&button_colour=f8ebd9&font_colour=000000&font_family=Comic&outline_colour=000000&coffee_colour=FFDD00"
            crossorigin="anonymous"
        /></a>
      </div>
      <div class="hiddenInApp">
        <a href="https://chessconnect.de" target="_blank" style="display: inline">chessconnect.de</a>
      </div>
    </div>

    <script src="../../dist/optiondlg.js"></script>
  </body>
</html>
