<!doctype html>
<html lang="en" style="min-width: 700px; min-height: 600px">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chessconnect Options</title>
    <style>
      body {
        font-family: 'Arial', sans-serif;
        font-size: 16px;
        line-height: 1.6;
        margin: 20px;
        background-color: #f0edea;
        overflow: hidden;
      }

      html {
        overflow: hidden;
      }

      h1 {
        text-align: center;
        font-size: 48px;
        color: #606060;
      }

      h2 {
        font-size: 16px;
      }

      ul {
        list-style-type: circle;
        padding-left: 20px;
      }

      .version {
        margin-bottom: 10px;
      }

      .date {
        font-style: italic;
      }

      .tab-container {
        width: 100%;
        height: 100%;
        margin: 0px auto;
        border: 1px solid #ddd;
        border-radius: 5px;
        overflow: hidden;
        background-color: #f0edea;
      }

      .tab-header {
        display: flex;
        background-color: #f0edea;
      }

      .tab-btn {
        border: none;
        outline: none;
        cursor: pointer;
        padding: 10px 10px;
        flex: 1;
        text-align: center;
        transition: background-color 0.3s;
        background-color: #eee4dd;
        font-size: 16px;
      }

      .tab-btn.active {
        background-color: #d7c0b0;
      }

      .flex-container {
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
      }

      .flex-container > div {
        margin: 10px;
        padding: 10px;
        /* Adjusted padding */
        border: 1px solid #ddd;
        border-radius: 5px;
        background-color: #f0edea;
      }

      .flex-container label {
        margin-bottom: 5px;
        /* Adjusted margin */
        padding: 5px;
        /* Adjusted padding */
      }

      .flex-container select,
      .flex-container input {
        width: calc(100% - 10px);
        height: 60px;
        padding: 4px;
        box-sizing: border-box;
        margin-bottom: 5px;
        font-size: 16px;
      }

      #status {
        margin-top: 10px;
        border-radius: 5px;
        background-color: #f0edea;
      }

      .optionButton {
        padding: 8px 16px;
        background-color: #d7c0b0;
        color: black;
        border: none;
        cursor: pointer;
        border-radius: 5px;
        display: block;
        margin: 20px auto;
        width: 80%;
        font-size: 16px;
      }

      .optionButton:disabled {
        background-color: #ddd;
      }

      .siteButton {
        height: 80px;
      }

      p {
        margin-bottom: 10px;
      }

      a {
        color: black;
      }

      a:hover {
        text-decoration: underline;
      }

      .align-vertical {
        display: flex;
        align-items: center;
        /* Vertically center the items */
      }

      .checkbox-label {
        display: flex;
        align-items: center;
      }

      .checkbox-label input[type='checkbox'] {
        margin-right: 5px;
        /* Adjusted margin */
        max-width: max-content;
      }

      .button-container {
        display: flex;
        justify-content: space-between;
        width: 100%;
        gap: 20px;
      }

      input[type='color'] {
        border: none;
        padding: 0;
        background: none;
      }

      img.chessconnect {
        overflow: hidden;
        display: block;
        margin: 0 auto;
        max-width: 100%;
        height: 100px;
      }
    </style>

    <script>
      const reloadTimer = setTimeout(() => {
        location.reload();
      }, 2000);
    </script>
  </head>

  <body>
    <h1>Chessconnect</h1>

    <div>
      <div class="tab-container" id="contentContainer" style="display: none">
        <div class="tab-header">
          <button class="tab-btn active" id="tabButtonOptions" data-tab="tabOptions" i18ntag="Options"></button>
        </div>

        <div class="tab-content" id="tabOptions" style="display: block">
          <div class="flex-container">
            <div>
              <label for="onOpponentMove" i18ntag="OnOpponentMove"></label>
              <select id="onOpponentMove">
                <option value="1" i18ntag="Beep"></option>
                <option value="2" i18ntag="KnockWood"></option>
                <option value="0" i18ntag="StayQuiet"></option>
              </select>

              <label for="latency" i18ntag="MoveLatencyInMs"></label>
              <input type="number" id="latency" />
            </div>
          </div>
        </div>
      </div>

      <div class="button-container">
        <button
          class="optionButton siteButton"
          id="chesscom"
          onclick="window.location.href='https://www.chess.com/login_and_go?returnUrl=https://www.chess.com/play/online/connected-board'"
          disabled
        >
          chess.com
        </button>
        <button class="optionButton siteButton" id="lichess" disabled>lichess.org</button>
        <button
          class="optionButton siteButton"
          id="noctie"
          _onclick="window.location.href='https://chessnought--ccinput-e0hl8zr7.web.app/'"
          onclick="window.location.href='https://app.noctie.ai/home'"
          disabled
        >
          noctie.ai
        </button>
        <button
          class="optionButton siteButton"
          id="chessiverse"
          onclick="window.location.href='https://chessiverse.com/signin'"
          disabled
        >
          chessiverse
        </button>
        <button class="optionButton siteButton" id="exitapp" i18ntag="ExitApp">Exit App</button>
      </div>

      <p>
        <span id="version_tag"></span>
      </p>
    </div>

    <div id="waitingForClock">
      <h2 i18ntag="waitingForClock"></h2>
    </div>
  </body>
</html>
