<style>
  .dialog-body {
    font-family: 'Arial', sans-serif;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: fit-content;
    width: fit-content;
    background-color: rgba(0, 0, 0, 0.5);
  }

  .dialog-container {
    background-color: #eceef3;
    border-radius: 8px;
    box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);
    padding: 20px;
    text-align: center;
    font-size: 12pt;
    color: #7c5c4c;
  }

  .dialog-buttons {
    margin-top: 20px;
  }

  .dialog-btn {
    padding: 10px 20px;
    margin: 7px;
    cursor: pointer;
    border: none;
    border-radius: 5px;
    font-size: 16px;
  }

  .dialog-btn-yes {
    background-color: #4caf50;
    color: #fff;
  }

  .dialog-btn-no {
    background-color: #f44336;
    color: #fff;
  }
</style>

<div class="dialog-body">
  <div class="dialog-container">
    <h3>Chessconnect</h3>
    <p id="yesNoDialogMessage">Do you want to proceed?</p>
    <div class="dialog-buttons">
      <button class="dialog-btn dialog-btn-yes" id="yesNoDialogYesButton">Yes</button>
      <button class="dialog-btn dialog-btn-no" id="yesNoDialogNoButton">No</button>
    </div>
    <label
      for="dontAskAgainCheckbox"
      style="margin-top: 10px; display: inline-flex; align-items: center; cursor: pointer"
    >
      <input type="checkbox" id="dontAskAgainCheckbox" style="margin-right: 6px" />
      <div id="dontShowAgainText">Don't show again</div>
    </label>
  </div>
</div>
