name: CI

on:
  push:
  pull_request:

jobs:
  web:
    name: Frontend (web + chess-shared)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # web's typecheck resolves @chess-ebook/chess-shared types from its dist/
      - name: Build chess-shared
        run: pnpm --filter chess-shared build

      - name: Lint
        run: pnpm --filter web lint

      - name: Typecheck
        run: pnpm --filter chess-shared typecheck && pnpm --filter web typecheck

      - name: Test (web)
        run: pnpm --filter web test

      - name: Test (chess-shared)
        run: pnpm --filter chess-shared test
