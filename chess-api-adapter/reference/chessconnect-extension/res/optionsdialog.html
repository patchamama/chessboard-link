<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yes/No Dialog</title>
    <style>
      body {
        font-family: 'Arial', sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: rgba(0, 0, 0, 0.5);
      }

      .dialog-container {
        background-color: #eceef3;
        border-radius: 8px;
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.2);
        padding: 20px;
        text-align: center;
        font-size: 12pt;
        color: #7c5c4c;
      }

      .dialog-buttons {
        margin-top: 20px;
      }

      .btn {
        padding: 10px 20px;
        margin: 7px;
        cursor: pointer;
        border: none;
        border-radius: 5px;
        font-size: 16px;
      }

      .btn-yes {
        background-color: #4caf50;
        color: #fff;
      }

      .btn-no {
        background-color: #f44336;
        color: #fff;
      }
    </style>
  </head>

  <body>
    <div class="dialog-container">
      <h3>Chessconnect</h3>
      <p id="optionsDialogMessage">Do you want to proceed?</p>
      <div class="dialog-buttons" id="buttonContainer"></div>
    </div>
  </body>
</html>
